name: CI/CD Pipeline

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: 🛎️ Checkout Repository
              uses: actions/checkout@v3

            - name: 🔧 Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: 18

            - name: 📦 Install Dependencies
              run: npm install

            - name: 🧪 Run Tests (If Available)
              run: npm test || echo "No tests found, skipping..."

    docker-build-push:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: 🛎️ Checkout Repository
              uses: actions/checkout@v3

            - name: 🔧 Log in to Docker Hub
              run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            - name: 🛠️ Build and Push Docker Image
              run: |
                  docker build -t ${{ secrets.DOCKER_USERNAME }}/express_app:latest .
                  docker push ${{ secrets.DOCKER_USERNAME }}/express_app:latest

    deploy:
        runs-on: ubuntu-latest
        needs: docker-build-push

        steps:
            - name: 🛎️ Checkout Repository
              uses: actions/checkout@v3

            - name: 🚀 Deploy to Server via SSH
              uses: appleboy/ssh-action@v0.1.10
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      docker pull ${{ secrets.DOCKER_USERNAME }}/express_app:latest
                      docker stop express_app || true
                      docker rm express_app || true
                      docker run -d --name express_app -p 5000:5000 --network backend ${{ secrets.DOCKER_USERNAME }}/express_app:latest
                      docker system prune -f
